<!doctype html>
<html lang="en" data-bs-theme="">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="5 Infogoodtrip">
  <meta name="author" content="Shreethemes">

  <title>{% block title %}Infogoodtrip{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/img/favicon.png') }}">

  {% block styles %}
  <!-- Plugins CSS -->
  <link href="{{ url_for('static', filename='assets/css/animation.css') }}" rel="stylesheet">

  <!-- Bootstrap 5 CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="{{ url_for('static', filename='assets/css/dropzone.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/rome.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/owl.carousel.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/owl.theme.default.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/rangeSlider.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/select2.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/magnific-popup.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/prism.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/choices.min.css') }}" rel="stylesheet">

  <!-- Icons CSS -->
  <link href="{{ url_for('static', filename='assets/css/fontawesome.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/bootstrap-icons.css') }}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='assets/css/style.css') }}" rel="stylesheet">
  {% endblock %}
</head>

<body>

  <div id="main-wrapper">
    <main>
      {% block hero_content %}
        {{ hero_content }}
      {% endblock %}
    </main>
  </div>
  <!-- End Wrapper -->

  <!-- Back to top -->
  <a href="#" class="btn-primary back-to-top" id="back2Top"><i class="bi bi-arrow-up"></i></a>
  <!-- Back to top -->

  {% block scripts %}

  <!-- ✅ Bootstrap 5 JS Bundle (incluye Popper) - DEBE IR ANTES que scripts que dependan de Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ✅ Mantengo jQuery SOLO porque tu template usa plugins jQuery (select2, owl, magnific, daterangepicker, etc.) -->
  <script src="{{ url_for('static', filename='assets/js/jquery.min.js') }}?v=1"></script>

  <!-- ❌ ELIMINADO: popper.min.js (ya viene en bootstrap.bundle) -->
  <!-- ❌ ELIMINADO: bootstrap.min.js local (conflicta con bootstrap 5 CDN / no-bundle) -->

  <script src="{{ url_for('static', filename='assets/js/dropzone.min.js') }}"></script>

  <!-- Waypoints Library -->
  <script src="https://cdn.jsdelivr.net/npm/waypoints@4.0.1/lib/noframework.waypoints.min.js"></script>

  <script src="{{ url_for('static', filename='assets/js/counterup.min.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/rangeslider.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/select2.min.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/owl.carousel.min.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/rome.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/jquery.magnific-popup.min.js') }}"></script>

  <script src="{{ url_for('static', filename='assets/js/addadult.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/custom.js') }}?v=1"></script>
  <script src="{{ url_for('static', filename='assets/js/base.js') }}?v=1"></script>

  <!-- Morris.js charts -->
  <script src="{{ url_for('static', filename='assets/js/raphael/raphael.min.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/morris.js/morris.min.js') }}"></script>
  <!-- Custom Chart JavaScript -->
  <script src="{{ url_for('static', filename='assets/js/custom/dashboard.js') }}"></script>

  <script src="{{ url_for('static', filename='assets/js/choices.min.js') }}"></script>

  <!-- Map -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD_8C7p0Ws2gUu7wo0b6pK9Qu7LuzX2iWY&amp;libraries=places&amp;"></script>
  <script src="{{ url_for('static', filename='assets/js/map/map_infobox.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/map/markerclusterer.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/map/map.js') }}"></script>

  <script src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

  <!-- Active menu -->
  <script src="{{ url_for('static', filename='assets/js/active-menu.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/js/bookmarks.js') }}?v=1"></script>

  {% endblock %}
</body>

</html>
