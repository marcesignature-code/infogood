{% extends "Base/no-header.html" %}

{% block hero_content %}


<div class="bg-cover" style="background: #ffe8ee url('{{ url_for('static', filename='assets/img/auth-bg.png') }}') no-repeat; height:100vh">

	<div id="preloader">
		<div class="preloader"><span></span><span></span></div>
	</div>
				
	<!-- Login Form Start -->
	<section>
		<div class="container">
			<div class="row align-items-center justify-content-center">
				<div class="col-xl-5 col-lg-7 col-md-9">
					<div class="authWrap">
					
						<div class="authhead">
							<!-- Logo -->
							<div class="text-center mb-4"><a href="/"><img class="img-fluid" src="{{ url_for('static', filename='assets/img/icon.png') }}" width="55" alt="logo"></a></div>
						</div>
						
						<div class="authbody d-black mb-4">
							<div class="card rounded-4 p-sm-5 p-4">
								<div class="card-body p-0">
							
									
									<!-- Title -->
									<div class="text-center">
										<h1 class="mb-2 fs-2">Two Step Verification</h1>
										<p class="mb-0">Protect your account more secure.</p>
									</div>

									<!-- Form START -->
									<form class="mt-4 text-start">
										
										<div class="form mt-3">
											<div class="form-group">
												<div class="row">
													<div class="col-12">
														<p class="fw-medium text-md">Enter the code we have sent you:</p>
													</div>
												</div>
												<div class="row g-4">
													<div class="col">
														<input type="text" class="form-control border border-2 br-dashed text-center fs-4">
													</div>
													<div class="col">
														<input type="text" class="form-control border border-2 br-dashed text-center fs-4">
													</div>
													<div class="col">
														<input type="text" class="form-control border border-2 br-dashed text-center fs-4">
													</div>
													<div class="col">
														<input type="text" class="form-control border border-2 br-dashed text-center fs-4">
													</div>
												</div>
											</div>
											
											<div class="modal-flex-item d-flex align-items-center justify-content-between mb-3">
												<div class="modal-flex-first">
													<span class="text-md">Don't Get a Code?</span>
												</div>
												<div class="modal-flex-last">
													<a href="JavaScript:Void(0);" class="text-primary fw-medium text-decoration-underline">Click to Resend</a>
												</div>
											</div>

											<div class="form-group">
												<button type="submit" class="btn btn-primary full-width fw-medium">Submit & Verify</button>
											</div>
											
										</div>
										
									</form>
									<!-- Form END -->
								</div>
								
							</div>
						</div>
						
						<div class="authfooter">
							<div class="text-center"><p class="text-dark mb-0">Back to<a href="/login/" class="fw-medium text-primary"> Sign In</a></p></div>
						</div>
						
					</div>

				</div>
			</div>
		</div>
	</section>
	<!-- Login Form Start -->

</div>

	<!-- Components/Home/index/log.html -->
	{% include 'Components/Home/index/log.html' %}

{% endblock %}
