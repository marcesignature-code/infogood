{% for item in overviews2 %}
    <div class="d-flex align-items-center justify-content-start gap-2 col-xl-3 col-lg-3 col-md-4 col-sm-6 col-6">
        <div class="flex-y01"><div class="square--35 circle bg-light-primary text-primary text-md"><i class="{{ item.icon }}"></i></div></div>	
        <div class="flex-y02">
            <p class="text-dark mb-0">{{ item.title }}</p>
        </div>	
    </div>
{% endfor %}
