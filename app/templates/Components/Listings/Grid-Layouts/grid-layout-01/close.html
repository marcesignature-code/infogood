{% if active_filters is defined and active_filters %}
    {% for item in active_filters %}
        <div class="alert tag-alert alert-light alert-dismissible fade show" role="alert">
            <span>{{ item.label }}</span>
            <a href="{{ item.remove_url }}" class="btn-close" aria-label="Remove filter"></a>
        </div>
    {% endfor %}
{% endif %}
