{% if total_pages is defined and total_pages > 1 and page is defined and build_page_url is defined %}
<!-- Pagination Start -->
<div class="row align-items-center justify-content-center mt-5">
    <div class="col-xl-12 col-lg-12 col-md-12">
        <nav aria-label="Page navigation example">
          <ul class="pagination justify-content-center">
            <li class="page-item{% if page <= 1 %} disabled{% endif %}">
              <a class="page-link" {% if page > 1 %}href="{{ build_page_url(page - 1) }}"{% endif %} aria-label="Previous">
                <i class="fa-solid fa-arrow-left"></i>
              </a>
            </li>
            {% for page_num in range(1, total_pages + 1) %}
              <li class="page-item{% if page_num == page %} active{% endif %}">
                <a class="page-link" href="{{ build_page_url(page_num) }}">{{ page_num }}</a>
              </li>
            {% endfor %}
            <li class="page-item{% if page >= total_pages %} disabled{% endif %}">
              <a class="page-link" {% if page < total_pages %}href="{{ build_page_url(page + 1) }}"{% endif %} aria-label="Next">
                <i class="fa-solid fa-arrow-right"></i>
              </a>
            </li>
          </ul>
        </nav>
    </div>
</div>
<!-- Pagination END -->
{% endif %}
