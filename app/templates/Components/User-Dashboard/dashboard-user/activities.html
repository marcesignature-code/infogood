{% if activities %}
{% for item in activities %}
<li>
    <span class="icons {{ item.icon_bg }} {{ item.icon_color }}"><i class="{{ item.icon }}"></i></span>
    <div class="listCaps">{{ item.html|safe }}</div>
</li>
{% endfor %}
{% else %}
<li>
    <span class="icons bg-light-secondary text-secondary"><i class="bi bi-info-circle"></i></span>
    <div class="listCaps">No recent activity yet.</div>
</li>
{% endif %}
