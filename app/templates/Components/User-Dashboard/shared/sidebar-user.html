<div class="user-dashboard-inner h-100 border-end border-2 py-5 p-3 d-lg-block d-none dashboard-sidebar">
    <button id="sidebarToggle" class="sidebar-toggle-btn" type="button" aria-label="Minimizar menú">
        <i class="bi bi-chevron-left"></i>
    </button>

    <div class="dashboard_users mb-4">
        <div class="square--80 circle mx-auto mb-1 dashboard-user-avatar">
            <img src="{{ url_for('static', filename='assets/img/user.jpg') }}" class="img-fluid circle" alt="User Image">
        </div>
        <div class="user-nameTitle text-center">
            <h4 class="lh-base fw-semibold text-light mb-0">Welcome Back</h4>
            <h6 class="text-light fw-medium opacity-75 mb-0">Edwin</h6>
        </div>
    </div>

    <div class="dashboard_Menu">
        <ul>
            <li>
                <a href="/dashboard/user" class="{% if request.path == '/dashboard/user' or request.path == '/dashboard-user/' %}active{% endif %}">
                    <i class="bi bi-speedometer me-2"></i>
                    <span class="sidebar-text">Dashboard Area</span>
                </a>
            </li>

            <li>
                <a href="/dashboard-my-profile/" class="{% if request.path == '/dashboard-my-profile/' %}active{% endif %}">
                    <i class="bi bi-person-lines-fill me-2"></i>
                    <span class="sidebar-text">My Profile</span>
                </a>
            </li>

            <li>
                <a href="/dashboard-my-bookings/" class="{% if request.path == '/dashboard-my-bookings/' %}active{% endif %}">
                    <i class="bi bi-journal-check me-2"></i>
                    <span class="sidebar-text">My Bookings</span>
                </a>
            </li>

            <li>
                <a href="/dashboard-my-listings/" class="{% if request.path == '/dashboard-my-listings/' %}active{% endif %}">
                    <i class="bi bi-ui-radios-grid me-2"></i>
                    <span class="sidebar-text">My Listings</span>
                </a>
            </li>

            <li>
                <a href="/dashboard-bookmarks/" class="{% if request.path == '/dashboard-bookmarks/' %}active{% endif %}">
                    <i class="bi bi-bookmark-star me-2"></i>
                    <span class="sidebar-text">Bookmarkes</span>
                </a>
            </li>

            <li>
                <a href="/dashboard-messages/" class="{% if request.path == '/dashboard-messages/' %}active{% endif %}">
                    <i class="bi bi-chat-dots me-2"></i>
                    <span class="sidebar-text">Messages</span>
                    <span class="notti_coun style-1">3</span>
                </a>
            </li>

            <li>
                <a href="/dashboard-reviews/" class="{% if request.path == '/dashboard-reviews/' %}active{% endif %}">
                    <i class="bi bi-yelp me-2"></i>
                    <span class="sidebar-text">Reviews</span>
                </a>
            </li>

            <li>
                <a href="/dashboard-wallet/" class="{% if request.path == '/dashboard-wallet/' %}active{% endif %}">
                    <i class="bi bi-wallet me-2"></i>
                    <span class="sidebar-text">Wallet</span>
                </a>
            </li>

            <li>
                <a href="/dashboard-add-listing/" class="{% if request.path == '/dashboard-add-listing/' %}active{% endif %}">
                    <i class="bi bi-patch-plus me-2"></i>
                    <span class="sidebar-text">Add Listing</span>
                </a>
            </li>
        </ul>
    </div>
</div>
