{% for item in counters %}
    <div class="col-xl-3 col-lg-3 col-md-6 col-sm-6 col-6">
        <div class="counter-wrap text-center">
            <h2 class="mb-0"><span class="ctr text-primary {{ item.style }} counter-value" data-bs-target="{{ item.number }}">{{ item.price }}</span>{{ item.symbol }}</h2>
            <p class="m-0">{{ item.title }}</p>
        </div>
    </div>
{% endfor %}
