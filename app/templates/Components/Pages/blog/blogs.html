{% for item in blogs %}
    <div class="col-xl-4 col-lg-4 col-md-6">
        <div class="card rounded-4 shadow-sm h-100">
            <a href="{{ url_for('main.blog_detail', title=slugify(item.title)) }}" class="d-block bg-gradient rounded-top">
                <img class="card-img-top hover-fade-out" src="{{ item.img }}" alt="blog image">
            </a>
            <div class="card-body">
                <a href="{{ url_for('main.blog_detail', title=slugify(item.title)) }}"><h4 class="fw-semibold fs-5 lh-base mb-3">{{ item.title }}</h4></a>
                <p>{{ item.desc }}</p>
                <div class="d-flex align-items-center justify-content-start mt-4">
                    <a href="{{ url_for('main.blog_detail', title=slugify(item.title)) }}" class="badge badge-primary rounded-pill">Continue Reading</a>
                </div>
            </div>
            <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3">
                <div class="text-dark fw-medium text-md"><i class="bi bi-calendar-check me-2"></i>{{ item.date }}</div>
                <div class="text-muted fw-medium text-md"><i class="bi bi-eye-fill me-2"></i>{{ item.views }}</div>
            </div>
        </div>
    </div>
{% endfor %}
